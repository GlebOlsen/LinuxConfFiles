[[block]]
block = "disk_space"
path = "/"
info_type = "available"
alert_unit = "GB"
warning = 20.0
alert = 10.0
format = " 💾 $available.eng(prefix:Gi,u:B,w:3) "

[[block]]
block = "weather"
interval = 900
format = " $weather $temp $humidity $direction$wind m/s ↑$sunrise.datetime(f:'%R') ↓$sunset.datetime(f:'%R')"
[block.service]
name = "metno"
coordinates = ["55.76", "12.10"]

[[block]]
block = "time"
interval = 1
format = " 📅 $timestamp.datetime(f:'%d/%m/%Y 🕒 %H:%M:%S') "