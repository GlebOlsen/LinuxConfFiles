# More option see https://github.com/DreamMaoMao/mango/wiki/

# Window effect
blur=1
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=0
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=64
drag_tile_to_tile=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=dk

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
# inner gaps 8 / no outer gaps (like sway: gaps inner 8)
gappih=8
gappiv=8
gappoh=0
gappov=0
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=4
# colors ported from sway client.* palette
rootcolor=0x051405ff
bordercolor=0x132a13ff
focuscolor=0xb3ff00ff
maximizescreencolor=0x2d5a27ff
urgentcolor=0x6a040fff
scratchpadcolor=0x4f772dff
globalcolor=0xa3be8cff
overlaycolor=0xff00ffff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller,dwindle
# default = dwindle (BSP split tiling, closest to i3/sway)
circle_layout=dwindle,tile,scroller,monocle
tagrule=id:1,layout_name:dwindle
tagrule=id:2,layout_name:dwindle
tagrule=id:3,layout_name:dwindle
tagrule=id:4,layout_name:dwindle
tagrule=id:5,layout_name:dwindle
tagrule=id:6,layout_name:dwindle
tagrule=id:7,layout_name:dwindle
tagrule=id:8,layout_name:dwindle
tagrule=id:9,layout_name:dwindle

### Output configuration (laptop first)
# per-monitor: name, resolution(width/height), position(x/y), rotation(rr: 0=normal,3=270)
# laptop internal panel = primary at 0,0
monitorrule=name:eDP-1,width:1920,height:1080,refresh:60,x:0,y:0,scale:1,rr:0
# desktop monitors (only present when docked)
monitorrule=name:DP-2,width:1280,height:1024,x:1920,y:1136,rr:0
monitorrule=name:DP-1,width:3840,height:2160,x:3200,y:0,rr:0
monitorrule=name:HDMI-A-1,width:1920,height:1080,x:7040,y:240,rr:3

### Wallpaper (per output, via swaybg — mango has no native bg; laptop first)
exec-once=swaybg -o eDP-1 -i /home/div/pics/wallpapers/bg.png -m fill -o DP-2 -i /home/div/pics/wallpapersS_safe/245085.jpg -m fill -o DP-1 -i /home/div/pics/wallpapers_safe/1770759436804440.png -m fill -o HDMI-A-1 -i /home/div/pics/wallpapersV_safe/961f3a2ce5d5412a4dbdb30374543a74ba6f2f70.png -m fill

### Autostart (ported from sway exec lines)
exec-once=waybar
exec-once=wl-paste --watch cliphist store
exec-once=gammastep -l 55.7:12.6 -t 6500:2700 -g 0.8 -m wayland
exec-once=swayidle -w timeout 900 'swaylock -C ~/.config/swaylock/config' before-sleep 'swaylock -C ~/.config/swaylock/config'

# Key Bindings (i3/sway-style)
# key name refer to `xev` or `wev`; mod keys: super,ctrl,alt,shift,none
# mod = SUPER (sway $mod / Mod4)

### Basics
# terminal
bind=SUPER,Return,spawn,foot
# kill focused window
bind=SUPER,q,killclient,
# app launcher
bind=SUPER,d,spawn,fuzzel
bind=SUPER+SHIFT,d,spawn,fuzzel --list-executables-in-path
# reload config
bind=SUPER+SHIFT,c,reload_config
# exit
bind=SUPER+SHIFT,e,quit

### Moving around — focus (hjkl, like vim + arrows)
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right
bind=SUPER,Left,focusdir,left
bind=SUPER,Down,focusdir,down
bind=SUPER,Up,focusdir,up
bind=SUPER,Right,focusdir,right
# cycle focus
bind=SUPER,Tab,focusstack,next

### Move window — same keys + Shift
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Right,exchange_client,right

### Workspaces (tags)
# switch to workspace
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0
# move focused window to workspace
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

### Layout stuff
# sway: $mod+s stacking, $mod+w tabbed, $mod+e toggle split
bind=SUPER,s,setlayout,deck
bind=SUPER,w,setlayout,monocle
bind=SUPER,e,setlayout,dwindle
bind=SUPER,n,switch_layout
# fullscreen
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,f,togglefakefullscreen,
# maximize
bind=SUPER,m,togglemaximizescreen,
# floating toggle
bind=SUPER+SHIFT,space,togglefloating,
# overview / global / overlay
bind=SUPER,space,toggleoverview,
bind=SUPER+SHIFT,g,toggleglobal,
bind=SUPER,o,toggleoverlay,

### Scratchpad
bind=SUPER,minus,toggle_scratchpad
bind=SUPER+SHIFT,minus,minimized,
bind=SUPER+SHIFT,i,restore_minimized

### Scroller proportion
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,

### Tag navigation (adjacent tags)
bind=SUPER+CTRL,Left,viewtoleft,0
bind=SUPER+CTRL,Right,viewtoright,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=CTRL,Right,viewtoright_have_client,0
bind=SUPER+CTRL+SHIFT,Left,tagtoleft,0
bind=SUPER+CTRL+SHIFT,Right,tagtoright,0

### Monitors
bind=ALT+SHIFT,Left,focusmon,left
bind=ALT+SHIFT,Right,focusmon,right
bind=SUPER+ALT,Left,tagmon,left
bind=SUPER+ALT,Right,tagmon,right

### Gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

### Move floating window (pixels)
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

### Resize floating window (pixels)
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

### Utilities (media / brightness / screenshot / misc — ported from sway)
bind=NONE,XF86AudioMute,spawn,pactl set-sink-mute @DEFAULT_SINK@ toggle
bind=NONE,XF86AudioLowerVolume,spawn,pactl set-sink-volume @DEFAULT_SINK@ -2%
bind=NONE,XF86AudioRaiseVolume,spawn,pactl set-sink-volume @DEFAULT_SINK@ +2%
bind=NONE,XF86AudioMicMute,spawn,pactl set-source-mute @DEFAULT_SOURCE@ toggle
# laptop internal backlight
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set 5%+
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-
# desktop (DDC/CI over all 3 monitors) — uncomment when docked
# bind=NONE,XF86MonBrightnessUp,spawn_shell,for d in 1 2 3; do ddcutil --display $d setvcp 10 + 10; done
# bind=NONE,XF86MonBrightnessDown,spawn_shell,for d in 1 2 3; do ddcutil --display $d setvcp 10 - 10; done
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,Print,spawn_shell,grim -g "$(slurp)" - | swappy -f -
bind=SUPER+ALT,v,spawn,cliphist-fuzzel-img
bind=SUPER,p,spawn,hyprpicker -a
bind=SUPER+SHIFT,o,spawn,swaylock -C ~/.config/swaylock/config
bind=SUPER,g,spawn,wl-kbptr

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
