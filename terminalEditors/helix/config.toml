theme = "ao"

[editor]
end-of-line-diagnostics = "hint"
line-number = "relative"
true-color = true
cursorline = true
scrolloff = 6

[editor.file-picker]
hidden = false
git-ignore = false
git-global = false
git-exclude = false

[editor.inline-diagnostics]
cursor-line = "error"

[editor.whitespace]
render = { space = "all", tab = "all", newline = "none" }

[editor.soft-wrap]
enable = true

[editor.indent-guides]
render = true
skip-levels = 1

[keys.normal]
C-d = ["page_cursor_half_down", "align_view_center"]
C-u = ["page_cursor_half_up", "align_view_center"]
X = "select_line_above"
V = ["select_mode", "extend_to_line_bounds"]
A-j = ["extend_to_line_bounds", "delete_selection", "paste_after"]
A-k = ["extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before"]

[keys.normal.space]
b = ":sh git blame -L %{cursor_line},%{cursor_line} %{buffer_name}"
G = [":new", ":insert-output lazygit", ":buffer-close!", ":redraw"]
S = [":write-all", ":insert-output scooter >/dev/tty", ":reload-all", ":redraw"]

[keys.select]
X = "select_line_above"
A-j = ["extend_to_line_bounds", "delete_selection", "paste_after"]
A-k = ["extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before"]
