backend = "glx";
vsync = true;
unredir-if-possible = true;

# General settings
dithered-present = false;
detect-rounded-corners = false;
detect-client-opacity = true;
detect-transient = false;
use-damage = true;

# Shadows
shadow = true;
no-dnd-shadow = true;
no-dock-shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;

# Fading
fading = false;

# Transparency
frame-opacity = 0.7;

# Corners
corner-radius = 0;

# Blur
blur: {
	method = "none";
};

# picom v13 ignores shadow-exclude / opacity-rule when rules are present,
# so all window-specific behavior lives here.
rules = (
	{
		match = "window_type = 'tooltip'";
		shadow = true;
		opacity = 0.75;
		full-shadow = false;
	},
	{
		match = "window_type = 'dock' || window_type = 'desktop' || _GTK_FRAME_EXTENTS@";
		blur-background = false;
		unredir = false;
	},
	{
		match = "window_type = 'dock' || window_type = 'desktop'";
		shadow = false;
		corner-radius = 0;
	},
	{
		match = "window_type *= 'menu'";
		shadow = false;
	},
	{
		match = "name = 'Notification'";
		shadow = false;
		opacity = 1.0;
	},
	{
		match = "name = 'Plank'";
		shadow = false;
		opacity = 1.0;
	},
	{
		match = "name = 'Docky'";
		shadow = false;
		opacity = 1.0;
	},
	{
		match = "name = 'Kupfer'";
		shadow = false;
		opacity = 1.0;
	},
	{
		match = "name = 'xfce4-notifyd'";
		shadow = false;
		opacity = 1.0;
	},
	{
		match = "name = 'Thunderbird'";
		shadow = false;
	},
	{
		match = "name = 'cpt_frame_window'";
		shadow = false;
	},
	{
		match = "name *= 'VLC'";
		shadow = false;
	},
	{
		match = "name *= 'compton' || name *= 'picom'";
		shadow = false;
	},
	{
		match = "name *= 'Chromium' || name *= 'Chrome' || name *?= 'firefox'";
		shadow = false;
	},
	{
		match = "name = 'alttab'";
		opacity = 0.90;
	},
	{
		match = "class_g = 'Conky' || class_g *?= 'conky'";
		shadow = false;
	},
	{
		match = "class_g = 'Kupfer'";
		shadow = false;
		opacity = 1.0;
	},
	{
		match = "class_g ?= 'Synapse'";
		shadow = false;
		opacity = 1.0;
	},
	{
		match = "class_g ?= 'Cairo-dock'";
		shadow = false;
		opacity = 1.0;
	},
	{
		match = "class_g ?= 'Xfce4-notifyd'";
		shadow = false;
		opacity = 1.0;
	},
	{
		match = "class_g ?= 'Xfce4-power-manager'";
		shadow = false;
		opacity = 1.0;
	},
	{
		match = "class_g ?= 'Notify-osd' || class_g ?= 'ulauncher' || class_g ?= 'rofi'";
		shadow = false;
	},
	{
		match = "class_g = 'copyq'";
		opacity = 0.80;
	},
	{
		match = "fullscreen";
		unredir = true;
	}
);
