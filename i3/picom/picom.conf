# Picom v13: small, predictable X11 compositing setup.
backend = "glx";
vsync = true;
use-damage = true;
detect-client-opacity = true;

# Subtle shadows, mainly useful for floating windows.
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.35;
shadow-offset-x = -12;
shadow-offset-y = -12;

# Fast GPU blur behind translucent windows.
blur: {
	method = "dual_kawase";
	strength = 6;
};
blur-background = true;

# Keep non-window surfaces shadow-free.
rules = (
	{
		match = "window_type = 'desktop' || window_type = 'dnd'";
		shadow = false;
		blur-background = false;
	}
);
