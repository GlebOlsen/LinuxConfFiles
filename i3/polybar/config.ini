[colors]
; Semantic palette from ~/.config/helix/themes/rainbow9.toml.
background = #99000000
foreground = #FFFFFFFF
muted = #FF808080
focused-text = #FF000000
accent = #FFB3FF00
urgent = #FFFF0000
; Match i3's focused child border.
border = #FF228B22
player = #FFFF00FF
audio = #FF00FF00
speed = #FF00FFFF
network = #FF3399FF
filesystem = #FFFF8000
weather = #FFFFFF00
clock = #FFB3FF00

[bar/main]
monitor = ${env:MONITOR:DisplayPort-0}
monitor-strict = true
width = 100%
height = 25px
offset-x = 0
offset-y = 0
bottom = false
fixed-center = true
dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

radius = 0
line-size = 0
; Match focused i3 windows with a separator only below the bar.
border-size = 0
border-bottom-size = 4px
border-bottom-color = ${colors.border}
padding-left = 0
padding-right = 0
module-margin = 0

font-0 = "Cartograph CF:size=12;2"
font-1 = "Symbols Nerd Font:size=12;2"
font-2 = "Noto Sans Symbols 2:size=12;2"

modules-left = i3
modules-right = player pulseaudio microphone netspeed network gpu-temp amd-gpu cpu-temp cpu memory filesystem weather date tray

override-redirect = false
enable-struts = true
enable-ipc = true
cursor-click = pointer
cursor-scroll = ns-resize

[module/i3]
type = internal/i3
pin-workspaces = false
show-urgent = true
index-sort = true
enable-click = true
enable-scroll = true
wrapping-scroll = true

label-mode = %mode%
label-mode-padding = 1
label-mode-background = ${colors.urgent}
label-mode-foreground = ${colors.foreground}

label-focused = %index%
label-focused-padding = 1
label-focused-background = ${colors.accent}
label-focused-foreground = ${colors.focused-text}

label-visible = %index%
label-visible-padding = 1
label-visible-foreground = ${colors.accent}

label-unfocused = %index%
label-unfocused-padding = 1
label-unfocused-foreground = ${colors.muted}

label-urgent = %index%
label-urgent-padding = 1
label-urgent-background = ${colors.urgent}
label-urgent-foreground = ${colors.foreground}

[module/player]
type = custom/script
exec = playerctl -s metadata --format '{{status}}@@  {{ artist }} - {{ title }} ' | awk '/^(Playing|Paused)@@/ { sub(/^[^@]*@@/, ""); print; shown = 1 } END { if (!shown) printf "\342\200\213" }'
interval = 3
interval-fail = 3
format = <label>
format-foreground = ${colors.player}
label = %output%
click-left = playerctl play-pause
scroll-up = playerctl next
scroll-down = playerctl previous

[module/pulseaudio]
type = internal/pulseaudio
interval = 2
use-ui-max = false
format-volume = <label-volume>
format-volume-foreground = ${colors.audio}
label-volume = "  %percentage%% "
format-muted = <label-muted>
label-muted = "  muted "
label-muted-foreground = ${colors.muted}
click-left = pavucontrol
click-right = pactl set-sink-mute @DEFAULT_SINK@ toggle
scroll-up = pactl set-sink-volume @DEFAULT_SINK@ +2%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -2%

[module/microphone]
type = custom/script
exec = wpctl get-volume @DEFAULT_AUDIO_SOURCE@ | awk '{ if ($3) print "  muted "; else printf "  %.0f%% ", $2 * 100 }'
interval = 2
format = <label>
format-foreground = ${colors.audio}
label = %output%
click-left = wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
scroll-up = wpctl set-volume -l 1 @DEFAULT_AUDIO_SOURCE@ 2%+
scroll-down = wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 2%-

[network-base]
type = internal/network
interface = enp39s0
accumulate-stats = true
unknown-as-up = true

[module/netspeed]
inherit = network-base
interval = 1
format-connected = <label-connected>
format-connected-foreground = ${colors.speed}
label-connected = "  %downspeed:7%  %upspeed:7% "
format-disconnected =

[module/network]
inherit = network-base
interval = 5
format-connected = <label-connected>
format-connected-foreground = ${colors.network}
label-connected = "  "
format-disconnected = <label-disconnected>
label-disconnected = "  "
label-disconnected-foreground = ${colors.muted}

[module/gpu-temp]
type = internal/temperature
interval = 2
hwmon-path = /sys/class/hwmon/hwmon1/temp1_input
units = false
warn-temperature = 65
format = <label>
format-foreground = ${colors.foreground}
format-warn = <label-warn>
label = " G: %temperature-c%° "
label-warn = " G: %temperature-c%° "
label-warn-foreground = ${colors.urgent}

[module/amd-gpu]
type = custom/script
exec = /home/div/.config/polybar/scripts/amd-gpu.sh
interval = 2
format = <label>
format-foreground = ${colors.foreground}
label = %output%

[module/cpu]
type = internal/cpu
interval = 1
format = <label>
format-foreground = ${colors.foreground}
label = "  %percentage:2%% "

[module/cpu-temp]
type = internal/temperature
interval = 1
hwmon-path = /sys/class/hwmon/hwmon2/temp1_input
units = false
warn-temperature = 65
format = <label>
format-foreground = ${colors.foreground}
format-warn = <label-warn>
label = " C: %temperature-c%° "
label-warn = " C: %temperature-c%° "
label-warn-foreground = ${colors.urgent}

[module/memory]
type = internal/memory
interval = 5
format = <label>
format-foreground = ${colors.foreground}
label = "  %gb_used% "

[module/filesystem]
type = internal/fs
mount-0 = /
interval = 5
warn-percentage = 90
format-mounted = <label-mounted>
format-mounted-foreground = ${colors.filesystem}
label-mounted = "  %free% "
format-warn = <label-warn>
label-warn = "  %free% "
label-warn-foreground = ${colors.urgent}
format-unmounted = <label-unmounted>
label-unmounted = "  unavailable "
label-unmounted-foreground = ${colors.urgent}

[module/weather]
type = custom/script
exec = /home/div/.config/polybar/scripts/weather.sh
interval = 900
interval-fail = 60
format = <label>
format-foreground = ${colors.weather}
label = %output%

[module/date]
type = internal/date
interval = 1
date = %d/%m/%Y
time = %H:%M:%S
format = <label>
format-foreground = ${colors.clock}
label = "  %date%  %time% "

[module/tray]
type = internal/tray
format = <tray>
format-background = ${colors.background}
tray-background = ${colors.background}
tray-foreground = ${colors.foreground}
tray-size = 25px
tray-padding = 0px
tray-spacing = 2px

[settings]
screenchange-reload = true
pseudo-transparency = true
